services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ROOT: /app
      DB_PATH: ${DB_PATH:-/app/data/krisha.sqlite3}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    restart: unless-stopped

  refresh:
    build: .
    profiles:
      - tools
    environment:
      APP_ROOT: /app
      DB_PATH: ${DB_PATH:-/app/data/krisha.sqlite3}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    command:
      [
        "python",
        "scripts/refresh_listings.py",
        "--kind",
        "manual",
        "--pages",
        "1",
        "--max-listings",
        "3",
        "--min-delay",
        "0",
        "--max-delay",
        "0"
      ]
