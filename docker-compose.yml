services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ROOT: /app
      DB_PATH: ${DB_PATH:-/app/data/krisha.sqlite3}
      SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-WAL}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles:
      - https
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  refresh:
    build: .
    profiles:
      - tools
    environment:
      APP_ROOT: /app
      DB_PATH: ${DB_PATH:-/app/data/krisha.sqlite3}
      SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-WAL}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    command:
      [
        "python",
        "scripts/refresh_listings.py",
        "--kind",
        "manual",
        "--pages",
        "1",
        "--max-listings",
        "3",
        "--min-delay",
        "0",
        "--max-delay",
        "0"
      ]

volumes:
  caddy_data:
  caddy_config:
